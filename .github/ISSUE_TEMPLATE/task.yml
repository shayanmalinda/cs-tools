name: "✍️ Create a Task"
description: Create a task for an app, module, or shared operation in the monorepo.
title: "[Task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        Please use the title in the following format:

        [App/Module] [Area] Short issue title

        Example:
        [Customer Portal] [BE] Bring user management business logic to the backend

  - type: dropdown
    id: app_module
    attributes:
      label: App / Module
      description: Select the related app, module, or shared area.
      options:
        - Customer Portal
        - Customer Service
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the impacted area.
      options:
        - BE
        - FE
        - Mobile
        - Docs
        - QA
        - Design
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the task.
      placeholder: Bring user management business logic to the backend
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide implementation details, context, or background.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the expected outcomes for this task.
      placeholder: |
        - Business logic is moved to the backend
        - Frontend uses the updated API
        - Existing functionality remains unchanged
