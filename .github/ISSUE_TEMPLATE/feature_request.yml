name: "💡 New Feature Request"
description: Suggest new functionality or features for the product.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please use the title in the following format:

        [App/Module] [Area] Short issue title

        Example:
        [Customer Portal] [FE] Add bulk user invite flow

  - type: dropdown
    id: app_module
    attributes:
      label: App / Module
      options:
        - Customer Portal
        - Customer Service
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - BE
        - FE
        - Mobile
        - Docs
        - QA
        - Design
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add references, mockups, or other helpful details.
