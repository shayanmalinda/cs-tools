name: Playwright E2E Tests

on:
  push:
    branches:
      - add-e2e-ui-testing-workflows # This will trigger the run automatically
  workflow_dispatch: # This will work only after merging to main

jobs:
  e2e:
    name: Run Playwright E2E tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/customer-portal/webapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/customer-portal/webapp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Build application
        run: pnpm run build

      - name: Start preview server
        run: pnpm run preview -- --host 0.0.0.0 --port 3000 &

      - name: Wait for preview server
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000 > /dev/null; then
              echo "Server is up"
              exit 0
            fi
            echo "Waiting for server to be ready..."
            sleep 2
          done
          echo "Server did not start in time" >&2
          exit 1

      - name: Run Playwright tests
        env:
          CI: true
        run: pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: always() # Changed to 'always' so you can see results even if it passes
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/customer-portal/webapp/playwright-report/
          retention-days: 7
